<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>변수와 자료형</title>
</head>
<body>
    <!--변수 : 데이터를 저장하기 위한 "이름이 붙은 저장 공간"-->
    <script>
        // 숫자형 변수 - number
        let age = 25;
        let temperature = 24.5;

        console.log("나이:",age); // , 사용하면 한칸 띄어서 나옴
        //console.log("나이:"+age); // + 사용하면 붙여서 나옴
        console.log("온도:",temperature)
        console.log(typeof(age));
        console.log(typeof(temperature));

        // 문자형 변수 - string
        let player = "가나다"
        let city ="한국"
        
        console.log(player);
        console.log(typeof(player));
        
        // 논리형(불린형) 변수 - boolean(true/false)
        let isRaining = false;
        
        console.log(isRaining);
        console.log(typeof(isRaining));

        // undfined - 할당이 안됌
        let score;
        console.log("점수",score)

        // 배열형 - object(객체)
        let fruits = ["사과","귤","레몬","포도"]
        console.log(fruits);
        console.log(typeof(fruits));
        
        // 객체 - object
        let student = {
            name: "가나다",
            age: 10,
            city:"한국"
        }
        console.log(student);
        console.log(typeof(student))
        console.log("도시:",student.city);
        
        
        
    </script>
</body>
</html>
