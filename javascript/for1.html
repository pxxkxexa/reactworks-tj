<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반복문 for</title>
</head>
<body>
    <script>
        //1부터 5까지 출력
        for(let i=1; i <=5; i++){
            console.log(i);
        }

        //1부터 10까지 홀수
        for(let i=1; i <=10; i++){
            if(i % 2 == 1){
                console.log(i);
            }
        }
    </script>
</body>
</html>
