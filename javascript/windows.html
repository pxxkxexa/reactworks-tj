<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Window 객체</title>
</head>
<body>
    <h2>window 객체 예제</h2>

    <script>
        // 1초마다 실행되는 코드
        // 콜백함수 - 함수의 매개인 함수
        // window.setInterval()
        setInterval(() => {
            console.log("1초마다 실행");
        }, 1000) 

        // 3초 후에 알림을 띄우는 커드
        // window.setTimeout()
        setTimeout(() => {
            alert("3초가 지났습니다")
        }, 3000)
    </script>
</body>
</html>
