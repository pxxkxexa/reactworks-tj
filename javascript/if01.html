<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>if문</title>
</head>
<body>
    <h2>짝수/홀수 판별</h2>
    <div id="result"></div>
    
    <script>
        const demo = document.getElementById("result");
        // prompt는 alert을 사용해서 숫자를 입력
        // parseInt를 사용해야 num으로 찍힘
        let num = parseInt(prompt('숫자를 입력하세요'));
        console.log(typeof(num));
        
        
        if(num % 2 == 0){
            // console.log("짝수입니다");
            // textContent는 오직 텍스트만 들어갈때 innerHTML은 <> 태그 넣을때 사용
            // demo.textContent = `${num}은 짝수입니다`
            demo.innerHTML = `<b>${num}</b>은 짝수입니다`
            demo.style.color = "red"
        }else{
            // console.log("홀수입니다")
            demo.innerHTML = `<b>${num}</b>은 홀수입니다`
            demo.style.color = "blue"
        }
    </script>
</body>
</html>
