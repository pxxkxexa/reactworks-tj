<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex 예제</title>
    <style>
        .container{
            width: 400px;
            height: 300px;
            border: 1px solid #000;
            display: flex;
            gap: 16px;

            align-items: center; /*세로방향으로 중앙 정렬*/
            align-items: start; /*세로방향으로 시작 위치에 정렬*/
            align-items: end; /*세로방향으로 끝 위치에 정렬*/
            flex-direction: row-reverse; /*가로방향으로 역순배치*/
            justify-content: space-around;
        }
        .box{
            width: 60px;
            height: 60px;
            background-color: cadetblue;
        }
        .box p{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"><p>1</p></div>
        <div class="box"><p>2</p></div>
        <div class="box"><p>3</p></div>
        <div class="box"><p>4</p></div>
    </div>
</body>
</html>
