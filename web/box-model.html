<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 모델</title>
    <style>
        .box1{
            width: 200px;/*px은 절대크기*/
            height: 100px;
            background-color: lightcoral;
            margin: 10px 20px;
        }
        .box2{
            width: 50%; /*%는 상대크기*/
            height: 100px;
            background-color: lightblue;
            margin: 10px 20px;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
</html>
