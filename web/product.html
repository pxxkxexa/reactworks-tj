<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 관련 예제</title>
    <style>
        h1{color: blue;}
        h2{color: green;}
        p{
            font-family: "바탕체";
            /*em은 부모 요소의 글자크기의 1.2배를 의미*/
            font-size: 1.2em;/*기본은 16px*/
        }
        .p1{
            background-color: yellow;
            line-height: 2; /*한 글자 간격 생성*/
        }
        .p2{
            background-color: aquamarine;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>세계 10대 푸드</h1>
    <h2>마늘(garic)</h2>
    <p class="p1">
        일해백리(一害百利)는 마늘의 별명이다. 한가지 해가 있고 백가지 이로움이 있다는 뜻이다.<br/>
        그 한가지 해란 아린 맛으로 위에 부담을 준다는 것이다.
    </p>
    <p class="p2">
        마늘 특유의 아린 맛은 알리신이라는 성분 때문에 살균 및 항균 작용을 하며<br/>
        마늘에 들어있는 아연이 피로 회복에 도움을 준다.
    </p>
</body>
</html>
