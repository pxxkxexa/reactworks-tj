<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강신청 폼</title>
    <link rel="stylesheet" href="../css/major.css">
</head>
<body>
    <div id="wrap">
        <form action="#" method="post">
            <fieldset>
                <legend>수강신청</legend>
                <ul>
                    <li>
                        <label for="cid">학과번호</label>
                        <!--required 입력제한 입력 안하면 못넘어감-->
                        <input type="text" id="cid" name="cid" placeholder="학과번호를 입력해주세요" autofocus required/>
                    </li>
                    <li>
                        <label for="sname">이름</label>
                        <input type="text" id="sname" name="sname" value="ㅂㅇㄴ" readonly disabled/>
                    </li>
                    <li>
                        <label for="major">학과</label>
                        <select name="major" id="major">
                            <option value="software">소프트웨어학과</option>
                            <option value="mechanic">기계공학과</option>
                            <option value="electric">전좌전기공학과</option>
                            <option value="computer">컴퓨터공학과</option>
                        </select>
                    </li>
                </ul>
            </fieldset>
            <div>
                <input type="submit" value="신청"/>
                <input type="reset" value="취소"/>
            </div>
        </form>
    </div>
</body>
</html>
