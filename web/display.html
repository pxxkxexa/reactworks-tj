<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배치 속성 예제</title>
    <style>
        /*블록 레벨 요소 - 수직 배치*/
        div{
            width: 100px;
            height: 100px;
            margin: 10px;
            /*display:block; 기본*/
            /*속성이 추가되면 inline-block 사용*/
            display: inline-block;
        }
        .box1{
            background-color: #00f;
        }
        .box2{
            background-color: #0f0;
        }
        .box3{
            background-color: #f0f;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
